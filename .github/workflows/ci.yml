name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check-lockfiles:
    name: check:lockfiles
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Check lockfiles
        run: npm run check:lockfiles

  build:
    name: npm ci + build
    runs-on: ubuntu-latest
    needs: check-lockfiles
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  lint-legacy:
    name: lint-legacy (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: check-lockfiles
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (temporary non-blocking)
        run: npm run lint
