name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
codex/create-technical-backlog-with-eslint-rules
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
  lint-legacy:
    name: Lint legacy (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

codex/create-technical-backlog-with-eslint-rules
      - name: Run lint
        run: npm run lint

      - name: Run full-repo lint (legacy)
        run: npm run lint

  lint-changed:
    name: Lint changed files (blocking)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run incremental lint on PR changes
        run: npm run lint:changed
main
